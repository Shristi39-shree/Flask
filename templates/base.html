<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}My Website{% endblock %}</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        header {
            background: #333;
            color: white;
            padding: 10px;
        }

        header a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        footer {
            background: yellow;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h2>My Site</h2>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
        </nav>
    </header>

    {% block content %}
    {% endblock %}

    <footer>
        <p>©2026 Made with Love ♥</p>
    </footer>

</body>
</html>
