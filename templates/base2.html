<!DOCTYPE html>
<html lang="en">
<head>

<title>{% block title %}My Feedback Site{% endblock %}</title>

<style>
body{
    font-family: Arial;
    padding:20px;
    background-color:rgb(240, 171, 219);
}

header,footer{
    background:#333;
    color:white;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
}

main{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
    <h1>Feedback Page</h1>
    <nav>
        <a href="/feedback">Feedback</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>&copy; Shristi : Made with love</p>
</footer>

</body>
</html>
